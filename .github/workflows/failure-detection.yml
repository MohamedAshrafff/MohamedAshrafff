name: failure-detection

on:
  workflow_run:
    workflows:
      - Fake CI
    types:
      - completed

jobs:
  detect:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Detected a failure
        run: |
          echo "FOUND FAILURE"
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Run ID: ${{ github.event.workflow_run.id }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"

      - name: Dump full event context
        run: echo '${{ toJSON(github.event.workflow_run) }}'

      - name: Fetch failed jobs
        id: fetch-jobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.event.workflow_run.jobs_url }}")

          job_id=$(echo "$response" | jq -r '.jobs[] | select(.conclusion=="failure") | .id' | head -1)

          echo "job_id=$job_id" >> $GITHUB_OUTPUT

      - name: Fetch logs of failed job
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -L \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.event.workflow_run.repository.full_name }}/actions/jobs/${{ steps.fetch-jobs.outputs.job_id }}/logs"